<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassa FantaFumo - Manual Export POS</title>
    <style>
        :root {
            --bg-dark: #09090b; --card-bg: #18181b; --text-main: #fafafa;
            --accent-red: #ef4444; --accent-green: #22c55e; --accent-gold: #eab308;
            --border: #27272a; --bg-hover: #27272a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .col-left { width: 300px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-center { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .col-right { width: 380px; background: var(--card-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; }

        h2 { font-size: 12px; padding: 15px; margin: 0; background: #09090b; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; }
        
        .file-io { padding: 15px; background: #09090b; border-bottom: 1px solid var(--border); }
        .btn-link { width: 100%; padding: 10px; background: #27272a; color: white; border: 1px dashed #52525b; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; }
        .btn-link.connected { background: #14532d; border-color: var(--accent-green); color: var(--accent-green); }

        .player-list { overflow-y: auto; height: 250px; border-bottom: 1px solid var(--border); }
        .player-btn { background: none; border: none; color: var(--text-main); padding: 12px 15px; text-align: left; width: 100%; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; justify-content: space-between; }
        .player-btn:hover { background: var(--bg-hover); }
        .player-btn.active { background: var(--accent-green); color: black; font-weight: bold; }

        .history-list { overflow-y: auto; flex-grow: 1; padding: 10px; display: flex; flex-direction: column; gap: 5px; background: #111113; }
        .hist-item { font-size: 11px; background: var(--card-bg); padding: 8px; border-radius: 4px; border: 1px solid var(--border); position: relative; }
        .hist-del { position: absolute; top: 6px; right: 8px; color: var(--accent-red); cursor: pointer; font-weight: bold; border: none; background: none; }

        .modifiers { display: flex; gap: 10px; padding: 15px; background: #09090b; border-radius: 8px; border: 1px solid var(--border); }
        .mod-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; font-weight: bold; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); transition: 0.2s; }
        .mod-label:has(input:checked) { background: #f97316; color: black; border-color: #f97316; }
        .mod-label input { display: none; }

        .category-title { color: #a1a1aa; font-size: 14px; font-weight: 700; margin-top: 10px; border-left: 3px solid var(--accent-gold); padding-left: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
        .item-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; text-align: left; }
        .item-btn:hover { border-color: #52525b; background: var(--bg-hover); }
        .item-points { font-size: 16px; font-weight: 900; margin-bottom: 2px; }
        .item-points.pos { color: var(--accent-green); }
        .item-points.neg { color: var(--accent-red); }
        .item-points.go { color: var(--accent-gold); }
        .item-points.neutral { color: #a1a1aa; }
        .item-name { font-size: 12px; color: #d4d4d8; line-height: 1.2; }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .cart-item { background: #27272a; padding: 10px; border-radius: 6px; font-size: 13px; position: relative; border-left: 4px solid #a1a1aa; }
        .cart-item.pos { border-left-color: var(--accent-green); }
        .cart-item.neg { border-left-color: var(--accent-red); }
        .cart-item.mod { border-left-color: #f97316; font-style: italic; }
        .cart-item.go { border-left-color: var(--accent-gold); }
        .cart-item.neutral { border-left-color: #a1a1aa; }
        .cart-item-remove { position: absolute; top: 8px; right: 8px; color: var(--accent-red); cursor: pointer; font-size: 16px; border: none; background: none; }

        .footer-checkout { padding: 15px; background: #09090b; border-top: 1px solid var(--border); }
        .btn-commit { width: 100%; padding: 16px; background: var(--accent-green); color: black; border: none; font-size: 15px; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-commit:hover { background: #16a34a; }
    </style>
</head>
<body>

    <div class="col-left">
        <div class="file-io">
            <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="caricaFile(event)">
            <button class="btn-link" id="fileBtn" onclick="document.getElementById('fileInput').click()">📁 Carica Database JSON</button>
        </div>
        <h2>Elenco Imputati</h2>
        <div class="player-list" id="playerList"></div>
        <h2>Fedina Penale Archiviata</h2>
        <div class="history-list" id="historyList">
            <div style="color:gray; font-size:12px; text-align:center; padding-top:20px;">Carica il file per sbloccare la cassa.</div>
        </div>
    </div>

    <div class="col-center">
        <div class="modifiers">
            <label class="mod-label"><input type="checkbox" id="mod-cs"> [CS] Lucidità da Sobrio (Malus x2)</label>
            <label class="mod-label"><input type="checkbox" id="mod-rec"> Marchio Recluta (Malus x2)</label>
            <label class="mod-label"><input type="checkbox" id="mod-nero"> Scommessa "Tutto in Nero" (Totale x3)</label>
        </div>
        <div id="catalogContainer" style="display:flex; flex-direction:column; gap:15px;"></div>
    </div>

    <div class="col-right">
        <h2>Scontrino Corrente (In Sospeso)</h2>
        <div class="cart-items" id="cartList">
            <div style="color:gray; text-align:center; padding-top:40px; font-size:13px;">Carrello vuoto.</div>
        </div>
        <div class="footer-checkout">
            <button class="btn-commit" onclick="confermaCambiamenti()">Conferma e Scarica JSON</button>
        </div>
    </div>

    <script>
        let dbData = { players: [], events: [] };
        let selectedPlayerId = null;
        let cart = [];
        let fileLoaded = false;

        const catalog = [
            { cat: "Macelleria Carnale (Bonus)", items: [
                { n: "Il Rompighiaccio", p: 30 }, { n: "Colonialismo", p: 50 }, { n: "Il Martire", p: 60 }, { n: "Corsa per la Vita", p: 80 }, { n: "Sfida alla Morte", p: 100 }, { n: "Esibizionismo", p: 100 }, { n: "Il Miracolo", p: 150 }, { n: "MILF Hunter", p: 250 }, { n: "La Doppietta", p: 300 }
            ]},
            { cat: "Devastazione Alcolica (Bonus)", items: [
                { n: "Lo Scroccatore", p: 20 }, { n: "Il Suicidio a Lattina", p: 50 }, { n: "Il Sommergibile", p: 60 }, { n: "Mutazione Genetica", p: 100 }
            ]},
            { cat: "Odissee Notturne (Bonus)", items: [
                { n: "Il Randagio", p: 70 }, { n: "Il Marco Polo Etilico", p: 130 }
            ]},
            { cat: "Arredo e Furti (Bonus)", items: [
                { n: "Il Geometra", p: 50 }, { n: "Il Bagnino", p: 80 }, { n: "Terrorismo Urbano", p: 110 }, { n: "L'Uomo Ragno", p: 120 }, { n: "Il Furto del Secolo", p: 150 }
            ]},
            { cat: "Anarchia e Polizia (Bonus)", items: [
                { n: "DJ Abusivo", p: 40 }, { n: "Lo Scimpanzé", p: 80 }, { n: "Amnesia Totale", p: 100 }, { n: "Lo Sciacallo", p: 100 }, { n: "Lo Schiavista", p: 150 }, { n: "Sfregio in Divisa", p: 150 }, { n: "Invasione di Campo", p: 180 }, { n: "Diritto di Fuga", p: 200 }
            ]},
            { cat: "Meccaniche Speciali & Indulti", items: [
                { n: "Premio Cirrosi Epatica", p: 40 }, { n: "Premio Ayrton Senna", p: 50 }, 
                { n: "Franchigia dei Vigliacchi (1° Pacco)", p: 0 }, 
                { n: "L'Indulto dei Disperati (Forza Maggiore)", p: 0 }, 
                { n: "Roulette Russa Telefonica (Vinta)", p: 100 }, { n: "Roulette Russa Telefonica (Persa)", p: -200 }, { n: "Alto Tradimento (Falso Indulto)", p: -200 }, { n: "Tentata Corruzione / Divieto di Mafia", p: -100 }
            ]},
            { cat: "Zerbini e Piagnistei (Malus)", items: [
                { n: "Stalker Patetico [CS]", p: -80 }, { n: "Il Tassista [CS]", p: -80 }, { n: "L'Escort Gratuito", p: -90 }, { n: "Eunuco Ufficiale [CS]", p: -100 }, { n: "Lo Sciacallo [CS]", p: -100 }, { n: "Minestra Riscaldata [CS]", p: -100 }, { n: "Ghosting Frontale [CS]", p: -150 }, { n: "Caduta nell'Abisso", p: -250 }, { n: "Panico da Asilo", p: -250 }
            ]},
            { cat: "Collassi e Trasporti (Malus)", items: [
                { n: "Il Poveraccio [CS]", p: -40 }, { n: "Respinto all'Ingresso [CS]", p: -50 }, { n: "Il Pensionato [CS]", p: -60 }, { n: "Disperso Piagnucolante [CS]", p: -90 }, { n: "Codardia Sfinterica", p: -120 }, { n: "Arma Biologica", p: -150 }, { n: "Pendolare in Coma", p: -150 }, { n: "Sacco di Patate", p: -180 }, { n: "L'Incontinente [CS]", p: -200 }
            ]},
            { cat: "Fallimenti Epocali (Malus)", items: [
                { n: "Isolamento Tech [CS]", p: -50 }, { n: "L'Intruso Miserabile [CS]", p: -90 }, { n: "Il Ladro Pentito [CS]", p: -100 }, { n: "Cecchino Cieco [CS]", p: -140 }, { n: "Donatore di Auto [CS]", p: -160 }, { n: "Pilota Cieco", p: -400 }
            ]},
            { cat: "Infamità e Vigliaccheria (Malus)", items: [
                { n: "Il Giuda [CS]", p: -120 }, { n: "Sabotatore Logistico [CS]", p: -150 }, { n: "Il Verme Seriale (2° Pacco)", p: -150 }
            ]},
            { cat: "Condizioni di Vittoria (Game Over)", items: [
                { n: "W-01: L'Ascensione", p: "W" }, { n: "W-02: Il Martirio Legale", p: "W" }, { n: "W-03: Il Dio Sceso in Terra", p: "W" }, { n: "W-04: L'Ereditiero", p: "W" }, { n: "W-05: Lo Spettro", p: "W" }, { n: "W-06: Il Rapitore di Cuori", p: "W" }
            ]},
            { cat: "Squalifica e Radiazione (Game Over)", items: [
                { n: "L-01: Castrazione Biologica Totale", p: "L" }, { n: "L-02: Il Daspo dai Diritti Umani", p: "L" }, { n: "L-03: Il Guinzaglio Corto", p: "L" }, { n: "L-04: Bancarotta del Sottone", p: "L" }, { n: "L-05: Selezione Naturale Medica", p: "L" }, { n: "L-06: Terrorismo Psicologico", p: "L" }, { n: "L-07: L'Infame", p: "L" }
            ]}
        ];

        function init() { buildCatalog(); }

        function caricaFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    dbData = JSON.parse(e.target.result);
                    fileLoaded = true;
                    
                    const btn = document.getElementById('fileBtn');
                    btn.innerText = `✔️ File Caricato: ${file.name}`;
                    btn.className = "btn-link connected";

                    selectedPlayerId = null;
                    renderPlayers();
                    document.getElementById('historyList').innerHTML = '<div style="color:gray; font-size:12px; text-align:center; padding-top:20px;">Seleziona un imputato per vederne la cronologia.</div>';
                } catch (err) {
                    alert("Errore nella lettura del file JSON.");
                }
            };
            reader.readAsText(file);
        }

        function calculateLiveScore(playerId) {
            let total = 0;
            dbData.events.filter(e => e.playerId === playerId).forEach(e => {
                if (typeof e.points === 'number') total += e.points;
            });
            return total;
        }

        function renderPlayers() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            dbData.players.forEach(p => {
                const currentScore = calculateLiveScore(p.id);
                const btn = document.createElement('button');
                btn.className = `player-btn ${selectedPlayerId === p.id ? 'active' : ''}`;
                btn.innerHTML = `<span>${p.name}</span><span style="font-weight:900;">${currentScore > 0 ? '+' : ''}${currentScore}</span>`;
                btn.onclick = () => { selectedPlayerId = p.id; renderPlayers(); updateHistoryPanel(); };
                list.appendChild(btn);
            });
        }

        function updateHistoryPanel() {
            const histContainer = document.getElementById('historyList');
            histContainer.innerHTML = '';
            if (!selectedPlayerId) return;

            const pEvents = dbData.events.filter(e => e.playerId === selectedPlayerId);

            if (pEvents.length === 0) {
                histContainer.innerHTML = '<div style="color:gray; font-size:12px; text-align:center; padding-top:20px;">Fedina penale intonsa.</div>';
                return;
            }

            pEvents.forEach((ev) => {
                const globalIndex = dbData.events.indexOf(ev);
                const item = document.createElement('div');
                item.className = 'hist-item';
                let ptShow = typeof ev.points === 'number' ? (ev.points > 0 ? `+${ev.points}` : ev.points) : ev.points;
                let colorBase = 'gray';
                if(typeof ev.points === 'number') {
                    if(ev.points > 0) colorBase = 'var(--accent-green)';
                    else if(ev.points < 0) colorBase = 'var(--accent-red)';
                } else { colorBase = 'var(--accent-gold)'; }
                
                item.innerHTML = `
                    <button class="hist-del" onclick="deleteHistoryItem(${globalIndex})">ELIMINA</button>
                    <div style="font-weight:bold; color:${colorBase}">${ptShow}</div>
                    <div>${ev.reason}</div>
                    <div style="font-size:9px; color:gray; margin-top:2px;">${ev.date}</div>
                `;
                histContainer.appendChild(item);
            });
        }

        function deleteHistoryItem(index) {
            if(confirm("Rimuovere questa transazione? L'eliminazione sarà salvata solo quando scaricherai il file.")) {
                dbData.events.splice(index, 1);
                renderPlayers();
                updateHistoryPanel();
            }
        }

        function buildCatalog() {
            const container = document.getElementById('catalogContainer');
            catalog.forEach(cat => {
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat.cat;
                container.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';

                cat.items.forEach(i => {
                    const btn = document.createElement('button');
                    btn.className = 'item-btn';
                    let pStyle = "go";
                    let pText = i.p;
                    if(typeof i.p === 'number') {
                        if (i.p > 0) { pStyle = "pos"; pText = `+${i.p}`; }
                        else if (i.p < 0) { pStyle = "neg"; pText = i.p; }
                        else { pStyle = "neutral"; pText = `0`; }
                    }
                    btn.innerHTML = `<span class="item-points ${pStyle}">${pText}</span><span class="item-name">${i.n}</span>`;
                    btn.onclick = () => addTransactionToCart(i.n, i.p);
                    grid.appendChild(btn);
                });
                container.appendChild(grid);
            });
        }

        function addTransactionToCart(name, points) {
            if (!fileLoaded) { alert("Devi prima caricare il file JSON!"); return; }
            if (!selectedPlayerId) { alert("Seleziona l'imputato dalla colonna sinistra!"); return; }

            const now = new Date();
            const dateStr = now.toLocaleString('it-IT', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            if (typeof points === 'string') {
                cart.push({ playerId: selectedPlayerId, reason: `${name} (GAME OVER STATUS)`, points: points, date: dateStr, type: 'go' });
                renderCart(); return;
            }

            let subtotal = points;
            let transactionGroup = [];

            transactionGroup.push({
                playerId: selectedPlayerId,
                reason: `${name} (Valore Base)`,
                points: points,
                date: dateStr,
                type: points > 0 ? 'pos' : (points < 0 ? 'neg' : 'neutral')
            });

            if (points < 0) {
                if (document.getElementById('mod-cs').checked) {
                    transactionGroup.push({ playerId: selectedPlayerId, reason: `[CS] Maledizione Sobrio: ${name}`, points: points, date: dateStr, type: 'mod' });
                    subtotal += points;
                }
                if (document.getElementById('mod-rec').checked) {
                    transactionGroup.push({ playerId: selectedPlayerId, reason: `[RECLUTA] Raddoppio Recluta: ${name}`, points: points, date: dateStr, type: 'mod' });
                    subtotal += points;
                }
            }

            if (document.getElementById('mod-nero').checked && points !== 0) {
                let neroValue = subtotal * 2;
                transactionGroup.push({ playerId: selectedPlayerId, reason: `[TUTTO IN NERO] Triplicatore: ${name}`, points: neroValue, date: dateStr, type: 'mod' });
            }

            cart = cart.concat(transactionGroup);
            renderCart();
        }

        function removeCartItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartList');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="color:gray; text-align:center; padding-top:40px; font-size:13px;">Carrello vuoto.</div>';
                return;
            }

            cart.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `cart-item ${item.type}`;
                let pointsDisplay = typeof item.points === 'number' ? (item.points > 0 ? `+${item.points}` : item.points) : item.points;
                
                card.innerHTML = `
                    <button class="cart-item-remove" onclick="removeCartItem(${index})">×</button>
                    <div style="font-weight:900; font-size:15px;">${pointsDisplay}</div>
                    <div style="color:#e4e4e7; font-size:12px; margin-top:2px;">${item.reason}</div>
                `;
                container.appendChild(card);
            });
        }

        function scaricaNuovoJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "fantafumo_data.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function confermaCambiamenti() {
            if (!fileLoaded) { alert("Nessun file caricato!"); return; }
            if (cart.length === 0) { alert("Scontrino vuoto!"); return; }
            
            cart.forEach(item => {
                dbData.events.push({
                    playerId: item.playerId,
                    points: item.points,
                    reason: item.reason,
                    date: item.date
                });
            });

            cart = [];
            renderCart();
            renderPlayers();
            updateHistoryPanel();

            document.getElementById('mod-cs').checked = false;
            document.getElementById('mod-rec').checked = false;
            document.getElementById('mod-nero').checked = false;

            scaricaNuovoJSON();
            alert("Database aggiornato! Assicurati di salvare il file appena scaricato nella tua cartella del FantaFumo.");
        }

        init();
    </script>
</body>
</html>
