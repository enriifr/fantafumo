<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FantaFumo - Classifica Ufficiale</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #09090b; --card-bg: #18181b; --text-main: #fafafa;
            --accent-red: #ef4444; --accent-green: #22c55e; --accent-gold: #eab308;
            --border: #27272a;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-main); }
        
        .btn-link { padding: 10px 20px; background: #27272a; color: white; border: 1px dashed #52525b; font-size: 13px; font-weight: bold; border-radius: 6px; }
        .btn-link.connected { background: #14532d; border-color: var(--accent-green); color: var(--accent-green); }

        /* Superlativi / Stats Cards */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 12px 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 10px; color: #a1a1aa; text-transform: uppercase; font-weight: 900; letter-spacing: 0.5px; }
        .stat-value { font-size: 16px; font-weight: 700; color: var(--text-main); text-transform: capitalize; }

        .leaderboard-grid { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        
        .player-row { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--card-bg); border: 1px solid var(--border); cursor: pointer;
            padding: 15px 25px; border-radius: 8px; transition: transform 0.2s, border-color 0.2s;
        }
        .player-row:hover { transform: translateX(5px); border-color: #52525b; }
        
        .player-row.pos-0 { border-left: 6px solid var(--accent-gold); background: linear-gradient(90deg, #2e2a0f 0%, var(--card-bg) 30%); }
        .player-row.pos-1 { border-left: 6px solid #a1a1aa; background: linear-gradient(90deg, #222225 0%, var(--card-bg) 30%); }
        .player-row.pos-2 { border-left: 6px solid #b45309; background: linear-gradient(90deg, #2c1a0e 0%, var(--card-bg) 30%); }
        
        .player-row.status-W { border-left: 6px solid var(--accent-green) !important; background: linear-gradient(90deg, #143a1e 0%, var(--card-bg) 30%) !important; }
        .player-row.status-L { border-left: 6px solid #991b1b !important; background: linear-gradient(90deg, #3b1111 0%, var(--card-bg) 30%) !important; }

        .left-info { display: flex; align-items: center; gap: 15px; }
        .rank-zone { display: flex; align-items: center; gap: 8px; width: 65px; font-size: 22px; font-weight: 900; color: #71717a; }
        .trend { font-size: 14px; font-weight: bold; }
        .trend.up { color: var(--accent-green); }
        .trend.down { color: var(--accent-red); }
        .trend.stable { color: #52525b; }
        .player-name { font-size: 22px; font-weight: 700; text-transform: capitalize; }
        
        .score-zone { display: flex; align-items: center; gap: 15px; }
        .badge { font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .badge.win { background: var(--accent-green); color: black; }
        .badge.lose { background: var(--accent-red); color: white; }
        
        .score { font-size: 28px; font-weight: 900; }
        .score.positive { color: var(--accent-green); }
        .score.negative { color: var(--accent-red); }

        .ticker-zone { background: #09090b; border-top: 2px solid var(--border); padding-top: 15px; margin-top: 20px; height: 100px; display: flex; flex-direction: column; gap: 5px; }
        .ticker-title { font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .ticker-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; }
        .ticker-item { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; display: flex; align-items: center; gap: 8px; }

        /* Papers Please Printer Notification */
        #printer-container { position: fixed; bottom: 0; right: 40px; z-index: 999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .printed-ticket { 
            background: #e4e4e7; color: #18181b; font-family: "Courier New", Courier, monospace;
            padding: 15px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px dashed #a1a1aa; border-bottom: none; font-weight: bold;
            transform: translateY(100%); animation: printSpit 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            pointer-events: auto; position: relative;
        }
        .printed-ticket::after {
            content: ''; position: absolute; bottom: -8px; left: 0; right: 0; height: 8px;
            background: linear-gradient(-45deg, transparent 4px, #e4e4e7 0), linear-gradient(45deg, transparent 4px, #e4e4e7 0);
            background-size: 8px 8px;
        }
        @keyframes printSpit {
            0% { transform: translateY(100%); }
            40% { transform: translateY(50%); }
            50% { transform: translateY(55%); } /* Piccolo scatto/rinculo meccanico */
            100% { transform: translateY(0); }
        }
        .ticket-header { font-size: 11px; border-bottom: 1px dashed #71717a; padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 1px; text-align: center; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; max-height: 85vh; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .modal-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .close-btn { background: none; border: none; color: #a1a1aa; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: white; }
        .modal-body { overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .chart-container { width: 100%; height: 250px; background: #09090b; border-radius: 8px; border: 1px solid var(--border); padding: 10px; box-sizing: border-box; }
        .tx-list { display: flex; flex-direction: column; gap: 8px; }
        .tx-item { background: #27272a; padding: 12px; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 CLASSIFICA GENERALE FANTAFUMO</h1>
        <div class="btn-link connected">🟢 Live Server Attivo</div>
    </div>

    <!-- Sezione Record Storici -->
    <div class="stats-bar">
        <div class="stat-card" style="border-top: 3px solid var(--accent-gold);">
            <div class="stat-label">🔥 Il Re del Fumo</div>
            <div class="stat-value" id="stat-king">-</div>
        </div>
        <div class="stat-card" style="border-top: 3px solid var(--accent-red);">
            <div class="stat-label">🚨 Più Multato</div>
            <div class="stat-value" id="stat-villain">-</div>
        </div>
        <div class="stat-card" style="border-top: 3px solid #60a5fa;">
            <div class="stat-label">📋 Record Infrazioni</div>
            <div class="stat-value" id="stat-count">-</div>
        </div>
    </div>

    <div class="leaderboard-grid" id="leaderboard">
        <div style="color:gray; text-align:center; padding-top:50px; font-size:18px;">Attesa dati dal server (GitHub Pages)...</div>
    </div>

    <div class="ticker-zone">
        <div class="ticker-title">⚡ Ultimi Reati a Registro:</div>
        <div class="ticker-container" id="ticker">
            <div style="color:gray; font-size:12px;">Nessun dato.</div>
        </div>
    </div>

    <!-- Container per le ricevute stile Papers Please -->
    <div id="printer-container"></div>

    <div class="modal-overlay" id="playerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalPlayerName">Nome Giocatore</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="chart-container">
                    <canvas id="playerChartCanvas"></canvas>
                </div>
                <div class="tx-list" id="modalTxList"></div>
            </div>
        </div>
    </div>

    <script>
        let dbData = { players: [], events: [] };
        let playerChartInstance = null; 
        let previousRanks = {}; // Salva l'ordine dei giocatori del check precedente per calcolare la freccia
        let isFirstLoad = true;

        async function checkFileChanges() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./fantafumo_data.json?t=${timestamp}`, { cache: 'no-store' });
                if (!response.ok) throw new Error('File non trovato');
                
                const newData = await response.json();
                
                // Rilevamento nuovi reati per la stampante Papers Please
                if (!isFirstLoad && newData.events.length > dbData.events.length) {
                    const diffCount = newData.events.length - dbData.events.length;
                    // Prende gli ultimi X eventi inseriti nel JSON
                    const newEvents = newData.events.slice(-diffCount);
                    newEvents.forEach(ev => {
                        const pName = newData.players.find(p => p.id === ev.playerId)?.name || "Ignoto";
                        spitTicket(pName, ev.reason, ev.points);
                    });
                }

                if (JSON.stringify(newData) !== JSON.stringify(dbData)) {
                    dbData = newData;
                    compilaClassifica();
                    isFirstLoad = false;
                }
            } catch (e) {
                console.error("Errore nel recupero dati dal server:", e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            checkFileChanges(); 
            setInterval(checkFileChanges, 5000); 
        });

        function spitTicket(player, reason, points) {
            const container = document.getElementById('printer-container');
            const ticket = document.createElement('div');
            ticket.className = 'printed-ticket';
            
            const formattedPoints = typeof points === 'number' ? (points > 0 ? `+${points}` : points) : points;
            
            ticket.innerHTML = `
                <div class="ticket-header">🚨 REGISTRO REATI - NOTIFICA</div>
                <div style="font-size:13px; margin-bottom:5px;">SOGGETTO: <span style="text-transform:uppercase;">${player}</span></div>
                <div style="font-size:12px; color:#52525b; margin-bottom:10px;">MOTIVO: ${reason}</div>
                <div style="font-size:16px; text-align:right; border-top:1px dashed #71717a; padding-top:5px;">SANC: <strong>${formattedPoints}</strong></div>
            `;
            
            // Auto-distruzione stile scontrino letto dopo 7 secondi
            ticket.onclick = () => ticket.remove();
            setTimeout(() => {
                ticket.style.opacity = '0';
                ticket.style.transform = 'translateY(20px)';
                ticket.style.transition = 'all 0.5s';
                setTimeout(() => ticket.remove(), 500);
            }, 7000);

            container.appendChild(ticket);
        }

        function compilaClassifica() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            // Calcolo punteggi correnti
            let leaderboardData = dbData.players.map(player => {
                let score = 0;
                let status = null; 
                let totalInfractions = 0;

                const playerEvents = dbData.events.filter(e => e.playerId === player.id);
                playerEvents.forEach(e => {
                    if (typeof e.points === 'number') { 
                        score += e.points; 
                        if(e.points < 0) totalInfractions++;
                    } 
                    else if (e.points === 'W') { status = 'W'; } 
                    else if (e.points === 'L') { status = 'L'; }
                });

                return { ...player, score, status, totalInfractions };
            });

            // Ordinamento classifica
            leaderboardData.sort((a, b) => {
                if (a.status === 'W' && b.status !== 'W') return -1;
                if (b.status === 'W' && a.status !== 'W') return 1;
                if (a.status === 'L' && b.status !== 'L') return 1;
                if (b.status === 'L' && a.status !== 'L') return -1;
                return b.score - a.score;
            });

            // Calcolo delle Stats globali (Record)
            if (leaderboardData.length > 0) {
                const king = [...leaderboardData].sort((a,b) => b.score - a.score)[0];
                const villain = [...leaderboardData].sort((a,b) => a.score - b.score)[0];
                const mostActive = [...leaderboardData].sort((a,b) => b.totalInfractions - a.totalInfractions)[0];

                document.getElementById('stat-king').innerText = `${king.name} (${king.score} pt)`;
                document.getElementById('stat-villain').innerText = `${villain.name} (${villain.score} pt)`;
                document.getElementById('stat-count').innerText = `${mostActive.name} (${mostActive.totalInfractions}⨉)`;
            }

            // Generazione righe con calcolo Trend Arrow
            leaderboardData.forEach((player, index) => {
                const row = document.createElement('div');
                
                let extraClass = `pos-${index}`;
                if (player.status) extraClass = `status-${player.status}`;

                row.className = `player-row ${extraClass}`;
                row.onclick = () => openPlayerModal(player);

                // Calcolo Trend Arrow
                let trendHTML = '<span class="trend stable">◀▶</span>';
                if (previousRanks[player.id] !== undefined) {
                    const oldRank = previousRanks[player.id];
                    if (index < oldRank) {
                        trendHTML = '<span class="trend up">▲</span>';
                    } else if (index > oldRank) {
                        trendHTML = '<span class="trend down">▼</span>';
                    }
                }
                // Salva il rank corrente per il prossimo polling loop
                previousRanks[player.id] = index;

                let badgeHTML = '';
                let scoreClass = player.score >= 0 ? 'positive' : 'negative';
                let scoreDisplay = (player.score > 0 ? '+' : '') + player.score;

                if (player.status === 'W') {
                    badgeHTML = `<span class="badge win">Vittoria Totale</span>`;
                    scoreDisplay = "🏆";
                } else if (player.status === 'L') {
                    badgeHTML = `<span class="badge lose">Squalificato</span>`;
                    scoreDisplay = "💀";
                }

                row.innerHTML = `
                    <div class="left-info">
                        <div class="rank-zone">
                            <span>#${index + 1}</span>
                            ${trendHTML}
                        </div>
                        <div class="player-name">${player.name}</div>
                    </div>
                    <div class="score-zone">
                        ${badgeHTML}
                        <div class="score ${scoreClass}">${scoreDisplay}</div>
                    </div>
                `;
                container.appendChild(row);
            });

            // Update Ticker inferiore
            const tickerContainer = document.getElementById('ticker');
            tickerContainer.innerHTML = '';
            
            const recentEvents = [...dbData.events].reverse().slice(0, 6);
            if(recentEvents.length === 0) {
                tickerContainer.innerHTML = '<div style="color:gray; font-size:12px;">Nessun reato a registro in questa sessione.</div>';
                return;
            }

            recentEvents.forEach(ev => {
                const pName = dbData.players.find(p => p.id === ev.playerId)?.name || "Ignoto";
                const pt = typeof ev.points === 'number' ? (ev.points > 0 ? `+${ev.points}` : ev.points) : ev.points;
                const tick = document.createElement('div');
                tick.className = 'ticker-item';
                tick.innerHTML = `<strong style="text-transform:capitalize;">${pName}</strong>: <span style="color:gray">${ev.reason}</span> (<strong>${pt}</strong>)`;
                tickerContainer.appendChild(tick);
            });
        }

        function openPlayerModal(player) {
            document.getElementById('modalPlayerName').innerText = `Storico: ${player.name}`;
            const txListContainer = document.getElementById('modalTxList');
            txListContainer.innerHTML = '';

            const pEvents = dbData.events.filter(e => e.playerId === player.id);
            
            let currentScore = 0;
            let chartLabels = ['Inizio'];
            let chartData = [0];

            if (pEvents.length === 0) {
                txListContainer.innerHTML = '<div style="color:gray; text-align:center; padding: 20px;">Nessuna transazione a registro.</div>';
            } else {
                pEvents.forEach((ev, index) => {
                    if (typeof ev.points === 'number') { currentScore += ev.points; }
                    chartLabels.push(`Ev #${index + 1}`);
                    chartData.push(currentScore);

                    let ptShow = typeof ev.points === 'number' ? (ev.points > 0 ? `+${ev.points}` : ev.points) : ev.points;
                    let colorBase = 'gray';
                    if(typeof ev.points === 'number') {
                        if(ev.points > 0) colorBase = 'var(--accent-green)';
                        else if(ev.points < 0) colorBase = 'var(--accent-red)';
                    } else { colorBase = 'var(--accent-gold)'; }

                    const txItem = document.createElement('div');
                    txItem.className = 'tx-item';
                    txItem.innerHTML = `
                        <div style="display:flex; flex-direction:column;">
                            <span>${ev.reason}</span>
                            <span style="font-size:10px; color:#71717a; margin-top:2px;">${ev.date}</span>
                        </div>
                        <strong style="color:${colorBase}; font-size: 16px;">${ptShow}</strong>
                    `;
                    txListContainer.prepend(txItem); 
                });
            }

            let themeColor = '#a1a1aa';
            if (player.status === 'W') themeColor = '#eab308';
            else if (player.status === 'L') themeColor = '#991b1b';
            else if (player.score > 0) themeColor = '#22c55e';
            else if (player.score < 0) themeColor = '#ef4444';

            if (playerChartInstance) { playerChartInstance.destroy(); }
            
            const ctx = document.getElementById('playerChartCanvas').getContext('2d');
            playerChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Andamento Punti',
                        data: chartData,
                        borderColor: themeColor,
                        backgroundColor: themeColor + '33',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3,
                        pointBackgroundColor: themeColor,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#27272a' }, ticks: { color: '#a1a1aa' } },
                        x: { display: false }
                    }
                }
            });

            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('playerModal').style.display = 'none'; }
        window.onclick = function(event) {
            const modal = document.getElementById('playerModal');
            if (event.target === modal) { closeModal(); }
        }
    </script>
</body>
</html>
